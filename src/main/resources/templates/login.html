<!DOCTYPE html>
<html lang="en"
    th:replace="~{base ::parent(~{::#content},~{::title}, ~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- below link will use to access tailwind.css classes here  -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
   
    <title>Login</title>'
    <style>
    </style>
</head>
<body>
    <div id="content">
              
      <div class="grid grid-cols-12 mt-4">
        <!-- Optimising screen for all type of devices -->
        <div class="col-span-4 md:col-span-2 lg:col-span-3 xl:col-span-4"></div>
        <!-- for medium screen and above it will take 8 cols and below it will take 12 cols -->
        <div class="col-span-12 md:col-span-8 lg:col-span-6 xl:col-span-4">
            <!-- taking space of 6 columns -->

            <!-- card from flowbite -->
            <div href="#" class="block p-6 border-t-8 border-green-700 bg-white rounded-xl shadow-sm hover:bg-gray-100 dark:bg-gray-800 dark:border-green-700 dark:hover:bg-gray-700">
           
            <!--  messagebox here (alerts) -->
            <div data-th-replace="~{message :: messagebox}">

            </div>


            <h5 class="mb-2 text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Login Here</h5>
            <p class="font-normal text-gray-400 dark:text-gray-400">Start managing contacts on cloud</p>
            
            <div class="text-red-600 text-center m-2" th:if="${param.error}">
			Invalid username and password.</div>
		    <div class="text-green-600 text-center m-2" th:if="${param.logout}">
			You have been logged out.</div>

            <!-- form -->
             <!-- to access object from register  use th:object="${obj}" -->
                <form data-th-action="@{'/authenticate'}" 
                        method="post"
                        class="mt-5"
                        novalidate
                        >
                    

                    <!-- Username field -->
                     <div class="mb-3">
                    <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Email</label>
                    <input name="email" type="email" id="email"  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="enter your email" required />
                    <!-- <p 
                        data-th-if="${#fields.hasErrors('email')}"
                        data-th-errors="*{email}"
                        class="text-red-600 px-1 py-2 dark:text-red-900">User is Required
                    </p> -->
                    </div>

                    <!-- password -->
                    <div class="mb-3">
                    <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">New Password</label>
                    <input name="password" type="password" id="password"  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required />
                    <!-- <p 
                        data-th-if="${#fields.hasErrors('password')}"
                        data-th-errors="*{password}"
                        class="text-red-600 px-1 py-2 dark:text-red-900">User is Required
                    </p> -->
                    </div>

                    <!-- Button -->
                    <div class="mb-3 flex justify-center space-x-3">
                        <button type="submit" class="px-3 py-2 rounded bg-green-800 hover:bg-green-700 text-white dark:bg-green-700 dark:hover:bg-green-800 ">Login</button>
                        <button type="reset" class="px-3 py-2 rounded bg-orange-800 hover:bg-orange-700 text-white dark:bg-orange-700 dark:hover:bg-orange-800 ">Reset</button>
                    </div>

                </form>
            </div>
        </div>
      </div>    
    </div>

    <script>
        console.log("Login page");
    </script>
</body>
</html>
